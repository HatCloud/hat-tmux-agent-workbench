# Agent terminal tmux additions.

# focus-events 必开：daemon 的 pane-focus-in / on-focus 上报依赖它；escape-time 0
# 让 Esc/Meta 键即时响应。
set -s focus-events on
set -s escape-time 0

# 终端能力:让 OSC8 超链接可点、osc7 上报 cwd、剪贴板/真彩透传（Ghostty/VSCode/iTerm2 通用）。
# hyperlinks 使 tmux 不再剥离 OSC 8（程序输出的链接可点击跳浏览器）；osc7 透传 pane cwd
# 给终端 App，相对文件路径才能被解析定位（文件路径点击开 vscode 的前置）。
set -g default-terminal "tmux-256color"
set -ga terminal-features "*:RGB:hyperlinks:clipboard:osc7"
set -g allow-passthrough on
set -g set-clipboard on
# 报错/提示信息显示 20s（默认 750ms 一闪而过看不清；任意按键可提前关闭）
set -g display-time 20000

# prefix 不走内建 prefix 选项，改由 root-table 绑定拦截：按下 C-b/C-s 时先把输入源切到
# ABC，再 switch-client -T prefix 进入 prefix 键表。这样中文 IME 下 prefix 仍能透传。
# 为何不用内建 prefix：没有「prefix 按下」的 hook 可挂切换逻辑（client_prefix 只是格式变量）。
# 同步 run（不加 -b）确保切换在下一个命令键按下前完成，避开异步竞态；
# test -x ... || true 保证二进制缺失/失败时 prefix 仍可用。
set -g prefix None
set -g prefix2 None
bind -n C-b run "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent ime switch >/dev/null 2>&1 || true" \; switch-client -T prefix
bind -n C-s run "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent ime switch >/dev/null 2>&1 || true" \; switch-client -T prefix
unbind -q C-a
unbind -q C-s
unbind -q C-t
unbind -q C-x
unbind -q C-v
unbind -q C-u
unbind -q C-d
unbind -q C-h
unbind -q C-j
unbind -q C-k
unbind -q C-l
# 反引号 ` 之前曾用作 root 触发 prefix，已撤销；显式 unbind 防止 re-source 留 stale 绑定。
unbind -q '`'
# prefix 设为 None 后 send-prefix 失效，用 send-keys 还原「连按两次 prefix 把字面键发给 pane」。
# 必须放在上面 unbind -q C-s 之后，否则会被该 unbind 清掉。
bind C-b send-keys C-b
bind C-s send-keys C-s
# status-left 由下方 agent-tracker status bar 段统一设置：原版 PREFIX 提示 + session tabs（left.sh）
set -g mouse on
setw -g mode-keys vi
set -s copy-command "pbcopy"
set -g pane-border-lines heavy
set -g pane-border-indicators off
set -g pane-border-status top
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour226,bold
set -g pane-border-format '#{?pane_active,#{?client_prefix,#[fg=colour16#,bg=colour226#,bold] [PREFIX] #[default],#[fg=colour16#,bg=colour226#,bold] [ACTIVE] #[default]}#[fg=colour226#,bold] #(~/.hat-config/tmux/scripts/pane_starship_title.sh #{pane_pid} "#{pane_tty}" "#{pane_title}" #{pane_width} "#{pane_current_path}" "#{pane_current_command}" "#{@pane_watching}") #[default],#[fg=colour245] #(~/.hat-config/tmux/scripts/pane_starship_title.sh #{pane_pid} "#{pane_tty}" "#{pane_title}" #{pane_width} "#{pane_current_path}" "#{pane_current_command}" "#{@pane_watching}") #[default]}'

bind -n M-C run-shell -b "~/.hat-config/tmux/scripts/open_vscode_project.sh '#{pane_current_path}'"
bind -n ç run-shell -b "~/.hat-config/tmux/scripts/open_vscode_project.sh '#{pane_current_path}'"
bind -n Ç run-shell -b "~/.hat-config/tmux/scripts/open_vscode_project.sh '#{pane_current_path}'"
bind Enter run-shell -b "~/.hat-config/tmux/scripts/open_vscode_project.sh '#{pane_current_path}'"
bind C-m run-shell -b "~/.hat-config/tmux/scripts/open_vscode_project.sh '#{pane_current_path}'"
# 原 prefix A/S 改用 prefix [ / ]（更顺手的方括号键）。[ 默认是 copy-mode
# （与 prefix v 重复），] 默认是 paste-buffer（用得少，牺牲）。旧 A/S 显式
# unbind 避免 source-file 后残留。
unbind -q A
unbind -q S
unbind -q '['
unbind -q ']'
# prefix ] 直接在当前目录新建 agent 窗口（无输入，名字自动）；
# prefix [ 弹窗用 fzf 从 z 目录历史选目录（关键字过滤，可直接输新路径）后在该目录新建，
# 二者共用 new_agent_window_prompt.sh
bind ']' run-shell -b "~/.hat-config/tmux/scripts/new_agent_window_prompt.sh here '#{pane_current_path}'"
bind '[' display-popup -E -w 80 -h 16 -d "#{pane_current_path}" "~/.hat-config/tmux/scripts/new_agent_window_prompt.sh ask '#{pane_current_path}'"
# prefix t → 本 window 定时任务面板（独立弹窗）
# prefix T → Todo 视图（palette 直接打开到 todos 子面板）
# prefix w → Window 导航面板
# prefix W → tmux 内置 choose-tree（原 prefix w 默认行为）
unbind -q t
unbind -q T
unbind -q w
unbind -q W
bind t run-shell "~/.hat-config/tmux/scripts/open_window_timer.sh '#{window_id}' '#{pane_current_path}' '#{session_name}'"
bind T run-shell "~/.hat-config/tmux/scripts/open_agent_palette.sh '#{client_tty}' '#{window_id}' '#{@agent_id}' '#{pane_current_path}' '#{session_name}' '#{window_name}' 'todos'"
bind w run-shell "~/.hat-config/tmux/scripts/open_window_nav.sh '#{window_id}' '#{pane_current_path}' '#{session_name}'"
bind W choose-tree -Zw
# Workspace 存档/恢复：prefix s 存档、prefix r 恢复 last、prefix g 选历史快照恢复。
# 不可用 prefix C-s（已被上方 bind C-s send-keys C-s 占用做字面 Ctrl-S 透传）。
unbind -q s
unbind -q r
unbind -q g
bind s run-shell -b "~/.hat-config/tmux/scripts/save_workspace.sh"
bind r run-shell -b "~/.hat-config/tmux/scripts/restore_workspace.sh"
bind g display-popup -E -w 80% -h 70% "~/.hat-config/tmux/scripts/choose_workspace.sh"
# c/d/u 恢复默认：c=new-window，d=detach-client，u 无默认行为（显式 unbind 让 re-source 真正清掉旧值）
bind c new-window
bind d detach-client
unbind -q u
# swap x/X：x = 带确认 kill-window，X = kill-pane
bind x confirm-before -p "kill-window #W? (y/n)" kill-window
bind X kill-pane
bind v copy-mode
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# prefix Tab → last-window：按一次跳到上一个 active window，再按一次跳回来。
# 类似 vim/screen 的 "previous buffer"，与 prefix n/p（顺序切窗）互补。
bind Tab last-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# prefix " 是某些终端/历史版本残留的 stale 绑定（旧版 bind \ split-window 把 \ 当
# 转义吞掉，" 被当成 key），source-file 不会自动清掉，显式 unbind 掉。
unbind -q '"'
bind '\' split-window -h -c "#{pane_current_path}"
bind -n M-u copy-mode \; send-keys -X halfpage-up
bind -n M-d copy-mode \; send-keys -X halfpage-down
bind -n ¨ copy-mode \; send-keys -X halfpage-up
bind -n ∂ copy-mode \; send-keys -X halfpage-down
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n ˙ select-pane -L
bind -n ∆ select-pane -D
bind -n ˚ select-pane -U
bind -n ¬ select-pane -R

# --- agent-tracker: session 工作空间切换 / 新建 / 重命名 / 移动 ---
# 按编号切换 session（工作空间）。C-数字 多数终端不发送，F1..F9 为稳定兜底。
bind -n C-1 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 1"
bind -n C-2 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 2"
bind -n C-3 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 3"
bind -n C-4 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 4"
bind -n C-5 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 5"
bind -n C-6 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 6"
bind -n C-7 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 7"
bind -n C-8 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 8"
bind -n C-9 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 9"
bind -n F1 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 1"
bind -n F2 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 2"
bind -n F3 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 3"
bind -n F4 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 4"
bind -n F5 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 5"
bind -n F6 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 6"
bind -n F7 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 7"
bind -n F8 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 8"
bind -n F9 run-shell -b "~/.hat-config/tmux/scripts/switch_session_by_index.sh 9"
# 新建 session（prefix S）：弹输入框填 label；直接回车走自动编号
bind S command-prompt -p "New session name (Enter = auto-number):" "run-shell -b \"~/.hat-config/tmux/scripts/new_session.sh #{q:session_id} #{q:pane_current_path} '%%'\""
# 重命名当前 session（触发后窗口名按命名模板同步）
bind . command-prompt -p "Rename session to:" "run-shell \"~/.hat-config/tmux/scripts/rename_session_prompt.sh '%%'\""
# 在 session 列表中左右移动当前 session（避开 vim h/j/k/l：用 < / >）
bind < run-shell -b "~/.hat-config/tmux/scripts/move_session.sh left"
bind > run-shell -b "~/.hat-config/tmux/scripts/move_session.sh right"
# agent palette：工作空间总览与切换
bind -n M-s run-shell "~/.hat-config/tmux/scripts/open_agent_palette.sh '#{client_tty}' '#{window_id}' '#{@agent_id}' '#{pane_current_path}' '#{session_name}' '#{window_name}'"
# prefix o：与 Alt-s 同样打开 agent palette（兜底：终端 Option 不发 Meta 时用）
bind o run-shell "~/.hat-config/tmux/scripts/open_agent_palette.sh '#{client_tty}' '#{window_id}' '#{@agent_id}' '#{pane_current_path}' '#{session_name}' '#{window_name}'"
# session 创建时自动编号 / 标准化命名
set-hook -ag session-created 'run -b "~/.hat-config/tmux/scripts/session_created.sh"'

# --- agent-tracker: status bar（session tabs + tracker 图标 ⏳/🔔/❌/❓）---
set -g status on
set -g status-interval 1
set -g status-left-length 90
set -g status-right-length 170
setw -g window-status-separator ''
# status bar 绿底（保留原 look）：浅灰/黄在绿上反差小，前景改用纯白 + 亮红
set -g status-style bg=green,fg=black
set -g status-left "#{?client_prefix,#[reverse] PREFIX #[default] ,}#(~/.hat-config/tmux/tmux-status/left.sh #{q:session_id} #{q:session_name} #{q:client_width} #{q:status-bg})   "
# 末尾每个 status-interval（1s）发一次轻量触发，但 --periodic 在 agent 内部把完整
# sync-names 限流为 5s，并用跨进程 single-flight 合并重叠触发；无 binary 时静默跳过。
set -g status-right "#(~/.hat-config/tmux/tmux-status/right.sh \"#{client_width}\" \"#{status-bg}\" \"#{session_name}\" \"#{window_index}\" \"#{pane_id}\" \"#{window_id}\")#(test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux sync-names --periodic)"
# 非选中：纯白（colour231）比原 #c5c8c6 浅灰在绿底上反差更大
setw -g window-status-format '#[fg=colour231] #I:#(~/.hat-config/tmux/tmux-status/window_task_icon.sh "#{window_id}" "#{@unread}" "#{@watching}" "#{@watch_failed}" "#{@agent_remote_bell}")#W '
# 选中：青（colour51）+ bold——绿底上冷色反差强、不刺眼；亮度低于红，看久了不累
setw -g window-status-current-format '#[fg=colour51,bold] #I:#(~/.hat-config/tmux/tmux-status/window_task_icon.sh "#{window_id}" "#{@unread}" "#{@watching}" "#{@watch_failed}" "#{@agent_remote_bell}")#W '
# 点击 status bar：左侧 session tab（range=user|SESS<数字>）→ switch-client；
# 其余（window-status 等原生 range）回落 tmux 默认的 select-window。
# 三个坑：① range 值不能带冒号——tmux #{s///} 替换模式含 `:` 会失败（`:` 是
# modifier 与变量名分隔符）；② range 值只放数字、补 `$` 还原成 $N 目标；
# ③ if-shell 的 then 分支命令体**不展开** #{} 格式（只有 -F 条件展开），故 switch-client
# 必须包在 `run-shell -C` 里——run-shell 会按 FORMATS 展开 #{mouse_status_range}/#{s///} 再执行。
bind -n MouseDown1Status if -F '#{m:SESS*,#{mouse_status_range}}' \
  "run -C \"switch-client -t '\$#{s/^SESS//:mouse_status_range}'\"" \
  "select-window -t ="

# --- agent-tracker: daemon hooks（聚焦/切换上报 + 自动 ack + pane 死亡清理）---
# pane-focus-in 分别调用 on-focus（CLI 拼窗口名）与 acknowledge（daemon 标记已读）
set-hook -g client-attached 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tracker command --client #{q:client_tty} --session-id #{q:session_id} --window-id #{q:window_id} --pane #{q:pane_id} acknowledge || true"'
set-hook -ag client-attached 'run -b "tmux refresh-client -S"'
# 竖屏自动把 status line 放顶部：attach 与 client 尺寸变化时判定
set-hook -ag client-attached 'run -b "~/.hat-config/tmux/scripts/update_status_position.sh"'
set-hook -g client-resized 'run -b "~/.hat-config/tmux/scripts/update_status_position.sh"'
set-hook -g pane-focus-in 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux on-focus --session #{q:session_id} --window #{q:window_id} --pane #{q:pane_id} || true"'
set-hook -ag pane-focus-in 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tracker command --client #{q:client_tty} --session-id #{q:session_id} --window-id #{q:window_id} --pane #{q:pane_id} acknowledge || true"'
set-hook -ag pane-focus-in 'run -b "tmux set -wu -t #{window_id} @unread 2>/dev/null || true; tmux set -wu -t #{window_id} @watch_failed 2>/dev/null || true"'
set-hook -ag pane-focus-in 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux sync-names || true"'
set-hook -ag pane-focus-in 'run -b "tmux refresh-client -S"'
set-hook -g pane-died 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tracker command --client #{q:client_tty} --session-id #{q:session_id} --window-id #{q:window_id} --pane #{q:pane_id} delete_task || true"'
set-hook -g after-select-window 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux on-focus --session #{q:session_id} --window #{q:window_id} --pane #{q:pane_id} || true"'
set-hook -ag after-select-window 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tracker command --client #{q:client_tty} --session-id #{q:session_id} --window-id #{q:window_id} --pane #{q:pane_id} acknowledge || true"'
set-hook -ag after-select-window 'run -b "tmux set -wu -t #{window_id} @unread 2>/dev/null || true; tmux set -wu -t #{window_id} @watch_failed 2>/dev/null || true"'
set-hook -ag after-select-window 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux sync-names || true"'
set-hook -ag after-select-window 'run -b "tmux refresh-client -S"'
# 切窗时：① 让该 window 的布局朝向与配置一致（auto 按当前屏幕，pinned 按设定）② status line 跟随朝向
set-hook -ag after-select-window 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux reflow-focus --window #{q:window_id} || true"'
set-hook -ag after-select-window 'run -b "~/.hat-config/tmux/scripts/update_status_position.sh"'
# window 尺寸变化（含选中后台窗导致的 resize）时同样修正布局朝向
set-hook -g window-resized 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux reflow-focus --window #{q:window_id} || true"'
set-hook -ag window-resized 'run -b "~/.hat-config/tmux/scripts/update_status_position.sh"'
# client-session-changed：切 session 时即时重算窗口名（含 client/provider）+ ack
set-hook -g client-session-changed 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux on-focus --session #{q:session_id} --window #{q:window_id} --pane #{q:pane_id} || true"'
set-hook -ag client-session-changed 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tmux sync-names || true"'
set-hook -ag client-session-changed 'run -b "test -x ~/.hat-config/agent-tracker/bin/agent && ~/.hat-config/agent-tracker/bin/agent tracker command --client #{q:client_tty} --session-id #{q:session_id} --window-id #{q:window_id} --pane #{q:pane_id} acknowledge || true"'
set-hook -ag client-session-changed 'run -b "tmux refresh-client -S"'

# --- 嵌套 ssh passthrough（议题 A）---
# 本地（外层）与远程（内层）tmux 同源此 conf。嵌套时外层 root 表会抢掉 C-b/C-s
# (prefix 入口) 与 M-* 等 -n 绑定。F12 在外层 set key-table off 把整个 root 表暂停，
# 所有 -n 绑定透传到内层远程 tmux 直接操作；再按 F12 切回外层。
# 指示用 session 级 set 覆盖 status-style（橙底反色）+ window-status-current-format
# (⌨ PASSTHROUGH)。务必用 session 级 `set`（不带 -g）+ `set -u` 还原——spike 实测：
# `set -g` 覆盖会污染全局且 `set -u`（session 级）不还原；session 级 set 才能被
# `set -u` 清除并回落到 source 的全局值。不碰 status-left（#(left.sh) 脚本渲染、
# set -u 还原不可靠，design R2 已禁）。
bind -T root F12 \
  set key-table off \;\
  set status-style 'bg=colour202,fg=colour16,bold' \;\
  set window-status-current-format '#[bg=colour202,fg=colour16,bold] ⌨ PASSTHROUGH #[default]' \;\
  refresh-client -S
bind -T off F12 \
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-format \;\
  refresh-client -S
# 二次逃逸键：部分终端/OS 吞 F12 时，off 表 C-q 同样切回外层（防被锁在 passthrough）。
# C-q 仅在 off 表绑定，不影响 root 表正常使用。
bind -T off C-q \
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-format \;\
  refresh-client -S
# 嵌套 ssh「内层 prefix」单键：root 表 C-q 把内层 tmux 的 prefix 键发给当前 pane，
# 让 C-q 充当内层 prefix——按 C-q 再按命令键即操作内层远程 tmux，无需进 F12 全透传
# （F12 是把所有键持续透传内层，C-q 是一次性发一个内层 prefix，二者互补）。
# 发 C-b 而非 C-s：C-s = XOFF(0x13) 会被 flow control 吞，C-b(0x02) 安全；内层同源此
# conf，C-b 同样绑成 prefix 入口。与上面 off 表的 C-q(退出 passthrough)不冲突——分属
# root / off 两个 key-table，对应普通态 / passthrough 态。
# 注意：若 C-q 按下无反应，多半是终端 flow control 把它当 XON 吃了，先 `stty -ixon`。
bind -n C-q send-keys C-b

# private overlay keymap（不存在时静默跳过）
source -q ~/.hat-config/private/keymap.conf
